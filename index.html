<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Todo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="overlay"></div>

  <div class="container">

    <input
      type="file"
      id="photo-input"
      accept="image/*"
    >

    <div class="input-area">

      <input
        type="text"
        id="task-input"
        placeholder="タスクを書く"
      >

      <button id="add-button">
        追加
      </button>

    </div>

    <ul id="todo-list"></ul>

    <h2>画像管理</h2>

    <div id="gallery"></div>

  </div>

  <script src="script.js"></script>

</body>
</html>

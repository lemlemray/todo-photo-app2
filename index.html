<!DOCTYPE html>
<html lang="ja">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Todo Photo</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="container">

    <h1>What do you need?</h1>

    <div class="input-area">

      <input
        type="text"
        id="task-input"
        placeholder="予定を書く"
      >

      <button id="add-button">
        追加
      </button>

    </div>

    <div class="image-upload">

      <input
        type="file"
        id="image-input"
        multiple
        accept="image/*"
      >

    </div>

    <a
      class="gallery-link"
      href="gallery.html"
    >
      画像管理へ
    </a>

    <div id="photo-area"></div>

    <div id="task-list"></div>

  </div>

  <script src="script.js"></script>

</body>
</html>

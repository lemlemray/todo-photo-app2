<!DOCTYPE html>
<html lang="ja">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Todo Photo</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="overlay"></div>

  <div class="container">

    <h1>
      What do you need?
    </h1>

    <div class="input-area">

      <input
        type="text"
        id="task-input"
        placeholder="タスクを書く"
      >

      <button id="add-button">
        追加
      </button>

    </div>

    <ul id="todo-list"></ul>

    <input
      type="file"
      id="image-input"
      multiple
      accept="image/*"
    >

    <a
      class="gallery-link"
      href="gallery.html"
    >
      画像管理へ
    </a>

  </div>

  <script src="script.js"></script>

</body>
</html>
